<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Viaggio di Ulisse - Gioco Interattivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap');

        body {
            font-family: 'Fauna+One', serif;
            background-color: #f4ece1;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            user-select: none;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .nav-btn {
            font-family: 'Cinzel', serif;
        }

        .game-layout {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
        }

        @media (min-width: 1024px) {
            .game-layout {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        .map-wrapper {
            flex: 2;
            position: relative;
        }

        .map-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1000 / 684;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            border: 8px solid #3d2b1f;
            border-radius: 4px;
            background-color: #e5d3b3;
            line-height: 0;
        }

        .map-image {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
            display: block;
        }

        .layer {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        .layer * {
            pointer-events: auto;
        }

        .marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background-color: rgba(153, 27, 27, 0.9);
            border: 2px solid #fcd34d;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .marker.active-marker {
            background-color: #16a34a;
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px #16a34a;
            z-index: 50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { box-shadow: 0 0 0 12px rgba(22, 163, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        .drop-zone {
            position: absolute;
            width: 4.8%;
            aspect-ratio: 1/1;
            border: 3px dashed #78350f;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: rgba(120, 53, 15, 0.1);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .drop-zone.target-correct {
            background: rgba(22, 163, 74, 0.5) !important;
            border: 3px solid #16a34a !important;
            transform: translate(-50%, -50%) scale(1.5) !important;
        }

        .drop-zone.target-wrong {
            background: rgba(217, 119, 6, 0.4) !important;
            border: 3px solid #d97706 !important;
            transform: translate(-50%, -50%) scale(1.2) !important;
        }

        .drop-zone.filled {
            border: 3px solid #16a34a;
            background: #16a34a;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(1);
        }

        .sidebar-container {
            flex: 1;
            min-width: 320px;
            max-height: 85vh;
            overflow-y: auto;
            background: rgba(253, 246, 227, 0.8);
            padding: 1.5rem;
            border: 2px solid #854d0e;
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
        }

        .score-panel {
            background: #854d0e;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: bold;
            box-shadow: 0 4px 0 #5d360a;
        }

        #items-container {
            position: relative;
            min-height: 100px;
        }

        .draggable-item {
            display: block;
            width: 100%;
            padding: 10px 14px;
            background: #fdf6e3;
            border: 2px solid #854d0e;
            cursor: grab;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 3px 3px 0px #854d0e;
            border-radius: 8px;
            position: relative;
            z-index: 100;
            touch-action: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .draggable-item.is-dragging {
            position: fixed !important;
            pointer-events: none !important;
            box-shadow: 15px 15px 30px rgba(0,0,0,0.3);
            transform: scale(1.05);
            opacity: 0.9;
            background: #fff;
            z-index: 9999;
            transition: none;
        }

        .draggable-item.returning {
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1.0);
            z-index: 50;
        }

        .draggable-item.correct {
            opacity: 0.2;
            pointer-events: none;
            filter: grayscale(1);
            text-decoration: line-through;
            margin-bottom: 10px;
        }

        .info-card {
            background: white;
            border: 2px solid #854d0e;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: none;
            z-index: 10000;
            text-align: center;
        }

        .win-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
            text-align: center;
        }

        .nav-btn.active {
            background: #854d0e;
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="error-toast">
        <div id="error-message"></div>
    </div>

    <div class="w-full max-w-5xl mx-auto flex justify-center mb-6">
        <nav class="flex gap-2 bg-amber-100 p-2 rounded-xl shadow-inner border border-amber-200">
            <button onclick="switchView('explore')" id="btn-explore" class="nav-btn px-4 py-2 rounded-lg active">Esplora</button>
            <button onclick="switchView('match-map')" id="btn-match-map" class="nav-btn px-4 py-2 rounded-lg">Luoghi</button>
            <button onclick="switchView('match-event')" id="btn-match-event" class="nav-btn px-4 py-2 rounded-lg">Eventi</button>
        </nav>
    </div>

    <header class="text-center mb-8">
        <h1 class="text-4xl font-bold text-amber-900 mb-2 uppercase tracking-tighter">Il Viaggio di Ulisse</h1>
        <p id="view-instruction" class="text-amber-800 italic">Esplora le tappe del mito cliccando sui numeri.</p>
    </header>

    <div class="game-layout">
        <div class="map-wrapper">
            <div class="map-container" id="main-map-container">
                <img src="https://i.postimg.cc/fTq64FXP/cartina-del-viaggio-di-ulisse.jpg" class="map-image" alt="Mappa del viaggio">
                <div id="layer-explore" class="layer"></div>
                <div id="layer-match-map" class="layer hidden"></div>
                <div id="layer-match-event" class="layer hidden"></div>
            </div>
        </div>

        <div id="sidebar" class="sidebar-container">
            <div id="sidebar-content"></div>
        </div>
    </div>

    <div id="win-overlay" class="win-overlay" onclick="this.style.display='none'">
        <h2 class="text-5xl font-bold mb-4">VIAGGIO CONCLUSO!</h2>
        <p class="text-xl">Hai posizionato correttamente tutte le tappe dell'Odissea.</p>
        <div id="final-score-display" class="mt-4 text-3xl text-amber-400 font-bold"></div>
        <button onclick="location.reload()" class="mt-8 bg-amber-600 text-white px-10 py-3 rounded-full font-bold uppercase hover:bg-amber-700">Riprova</button>
    </div>

    <script>
        const data = {
            "1": { "nome": "Troia", "desc": "La partenza: dopo dieci anni di guerra e l'inganno del cavallo.", "top": 46.43, "left": 97.36 },
            "2": { "nome": "Ciconi", "desc": "A Ismaro Ulisse saccheggia la città dei Ciconi.", "top": 34.22, "left": 98.68 },
            "3": { "nome": "Lotofagi", "desc": "L'isola dove il loto fa dimenticare il ritorno ai compagni.", "top": 93.56, "left": 14.95 },
            "4": { "nome": "Ciclopi", "desc": "L'incontro e lo scontro con il gigante Polifemo nella sua grotta.", "top": 65.71, "left": 29.45 },
            "5": { "nome": "Isola di Eolo", "desc": "Il re dei venti dona a Ulisse l'otre che contiene i venti contrari.", "top": 51.41, "left": 29.01 },
            "6": { "nome": "Lestrigoni", "desc": "I giganti cannibali che distruggono tutte le navi tranne quella di Ulisse.", "top": 21.37, "left": 23.96 },
            "7": { "nome": "Circe", "desc": "La maga che trasforma i compagni in porci e trattiene Ulisse per un anno.", "top": 17.51, "left": 11.76 },
            "8": { "nome": "Regno dei Morti", "desc": "Ulisse scende nell'Ade per consultare l'indovino Tiresia sul suo ritorno.", "top": 7.87, "left": 6.81 },
            "9": { "nome": "Circe (Ritorno)", "desc": "Breve sosta dalla maga prima di affrontare i pericoli del mare.", "top": 27.47, "left": 9.67 },
            "10": { "nome": "Sirene", "desc": "Ulisse ascolta il loro canto ammaliatore legato all'albero della nave.", "top": 48.04, "left": 39.34 },
            "11": { "nome": "Cariddi", "desc": "Il mostro marino che crea terribili gorghi risucchiando l'acqua.", "top": 58, "left": 36.92 },
            "12": { "nome": "Scilla", "desc": "Il mostro a sei teste che divora sei compagni di Ulisse.", "top": 63.62, "left": 45.05 },
            "13": { "nome": "Trinacria", "desc": "L'isola dove i compagni mangiano le vacche sacre al dio Sole.", "top": 76.15, "left": 44.29 },
            "14": { "nome": "Calipso", "desc": "Ulisse rimane prigioniero d'amore della ninfa per sette lunghi anni.", "top": 77.76, "left": 21.43 },
            "15": { "nome": "Feaci", "desc": "Ulisse naufraga e viene accolto da Nausicaa e dal re Alcinoo.", "top": 49.32, "left": 60.66 },
            "16": { "nome": "Itaca", "desc": "Il ritorno a casa, la strage dei Proci e l'abbraccio con Penelope.", "top": 58.64, "left": 69.01 }
        };

        let currentView = 'explore';
        let activeTappaId = null;
        let draggingElement = null;
        let dragOffset = { x: 0, y: 0 };
        let originalPos = { x: 0, y: 0 };
        let toastTimeout = null;

        // Gestione punteggio
        let totalScore = 0;
        let attemptsPerId = {}; // Traccia i tentativi per ogni ID in questa sessione

        function switchView(view) {
            currentView = view;
            activeTappaId = null;
            totalScore = 0;
            attemptsPerId = {};
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.id === `btn-${view}`));
            document.querySelectorAll('.layer').forEach(l => l.classList.add('hidden'));
            document.getElementById(`layer-${view}`).classList.remove('hidden');
            
            const instr = document.getElementById('view-instruction');
            const sidebarContent = document.getElementById('sidebar-content');
            sidebarContent.innerHTML = '';

            if (view === 'explore') {
                instr.innerText = "Esplora le tappe del mito cliccando sui numeri.";
                initExplore();
                renderSidebarExplore();
            } else {
                instr.innerText = "Trascina gli elementi verso il punto corretto sulla mappa.";
                initMatchingGame(view);
                updateScoreDisplay();
            }
        }

        function updateScoreDisplay() {
            const sidebarContent = document.getElementById('sidebar-content');
            let scoreDiv = document.getElementById('score-panel');
            if (!scoreDiv) {
                scoreDiv = document.createElement('div');
                scoreDiv.id = 'score-panel';
                scoreDiv.className = 'score-panel';
                sidebarContent.prepend(scoreDiv);
            }
            scoreDiv.innerText = `Punteggio: ${totalScore.toLocaleString('it-IT')} / 16`;
        }

        function initExplore() {
            const layer = document.getElementById('layer-explore');
            layer.innerHTML = '';
            Object.entries(data).forEach(([id, info]) => {
                const m = document.createElement('div');
                m.className = 'marker';
                m.style.top = info.top + '%';
                m.style.left = info.left + '%';
                m.innerText = id;
                m.onclick = () => selectTappa(parseInt(id));
                layer.appendChild(m);
            });
        }

        function renderSidebarExplore() {
            const container = document.getElementById('sidebar-content');
            if (!activeTappaId) {
                container.innerHTML = `<div class="empty-state py-10 text-center"><p class="text-3xl mb-4">🏛️</p><p class="text-amber-900 italic">Seleziona un punto numerato sulla mappa.</p></div>`;
                return;
            }
            const info = data[activeTappaId.toString()];
            container.innerHTML = `
                <div class="info-card">
                    <span class="text-xs font-bold text-amber-700 uppercase tracking-widest">Tappa ${activeTappaId}</span>
                    <h3 class="text-3xl font-bold text-amber-900 mt-1">${info.nome}</h3>
                    <div class="border-y border-amber-100 py-6 my-6 italic text-xl text-amber-800">"${info.desc}"</div>
                    <div class="flex gap-4">
                        <button onclick="selectTappa(${activeTappaId - 1})" class="flex-1 py-2 border border-amber-900 rounded-lg disabled:opacity-30" ${activeTappaId <= 1 ? 'disabled' : ''}>←</button>
                        <button onclick="selectTappa(${activeTappaId + 1})" class="flex-1 py-2 bg-amber-800 text-white rounded-lg disabled:opacity-30" ${activeTappaId >= 16 ? 'disabled' : ''}>→</button>
                    </div>
                </div>`;
        }

        function selectTappa(id) {
            if (id < 1 || id > 16) return;
            activeTappaId = id;
            document.querySelectorAll('.marker').forEach(m => m.classList.toggle('active-marker', m.innerText == id));
            renderSidebarExplore();
        }

        function initMatchingGame(type) {
            const layer = document.getElementById(`layer-${type}`);
            const sidebarContent = document.getElementById('sidebar-content');
            layer.innerHTML = '';
            sidebarContent.innerHTML = `
                <div id="score-panel" class="score-panel">Punteggio: 0 / 16</div>
                <h4 class="text-amber-900 font-bold uppercase text-xs mb-4 text-center tracking-widest">Trascina gli elementi</h4>
                <div id="items-container"></div>`;
            const itemsContainer = document.getElementById('items-container');

            Object.entries(data).forEach(([id, info]) => {
                const z = document.createElement('div');
                z.className = 'drop-zone';
                z.style.top = info.top + '%';
                z.style.left = info.left + '%';
                z.dataset.id = id;
                layer.appendChild(z);
                attemptsPerId[id] = 0; // Inizializza tentativi
            });

            Object.keys(data).sort(() => Math.random() - 0.5).forEach(id => {
                const item = document.createElement('div');
                item.className = 'draggable-item';
                item.innerText = type === 'match-map' ? data[id].nome : data[id].desc;
                item.dataset.id = id;
                item.addEventListener('mousedown', startDragging);
                item.addEventListener('touchstart', (e) => startDragging(e.touches[0]), {passive: false});
                itemsContainer.appendChild(item);
            });
        }

        function startDragging(e) {
            if (draggingElement) return;
            draggingElement = e.target;
            
            const rect = draggingElement.getBoundingClientRect();
            originalPos.x = rect.left;
            originalPos.y = rect.top;
            
            dragOffset.x = e.clientX - rect.left;
            dragOffset.y = e.clientY - rect.top;

            draggingElement.classList.add('is-dragging');
            draggingElement.style.width = rect.width + 'px';
            draggingElement.style.left = rect.left + 'px';
            draggingElement.style.top = rect.top + 'px';

            window.addEventListener('mousemove', handleDragging);
            window.addEventListener('mouseup', stopDragging);
            window.addEventListener('touchmove', handleTouchDragging, {passive: false});
            window.addEventListener('touchend', stopDragging);
        }

        function handleTouchDragging(ev) {
            ev.preventDefault();
            handleDragging(ev.touches[0]);
        }

        function handleDragging(e) {
            if (!draggingElement) return;
            draggingElement.style.left = (e.clientX - dragOffset.x) + 'px';
            draggingElement.style.top = (e.clientY - dragOffset.y) + 'px';

            document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('target-correct', 'target-wrong'));

            const target = document.elementFromPoint(e.clientX, e.clientY);
            const zone = target ? target.closest('.drop-zone') : null;

            if (zone && !zone.classList.contains('filled')) {
                const isCorrect = zone.dataset.id === draggingElement.dataset.id;
                zone.classList.add(isCorrect ? 'target-correct' : 'target-wrong');
            }
        }

        function stopDragging(e) {
            if (!draggingElement) return;
            
            const clientX = e.clientX || (e.changedTouches ? e.changedTouches[0].clientX : 0);
            const clientY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : 0);
            
            const target = document.elementFromPoint(clientX, clientY);
            const zone = target ? target.closest('.drop-zone') : null;
            const elementId = draggingElement.dataset.id;

            if (zone && !zone.classList.contains('filled')) {
                if (zone.dataset.id === elementId) {
                    // SUCCESSO
                    attemptsPerId[elementId]++; // Conta il tentativo decisivo
                    
                    // Logica Punteggio
                    if (attemptsPerId[elementId] === 1) totalScore += 1;
                    else if (attemptsPerId[elementId] === 2) totalScore += 0.5;
                    
                    updateScoreDisplay();

                    zone.classList.add('filled');
                    zone.innerHTML = `<span class="text-white text-[10px] font-bold">${elementId}</span>`;
                    draggingElement.classList.replace('is-dragging', 'correct');
                    draggingElement.style.position = '';
                    draggingElement.style.left = '';
                    draggingElement.style.top = '';
                    draggingElement.style.width = '';
                    checkWin();
                } else {
                    // ERRORE
                    attemptsPerId[elementId]++;
                    showError(`No, qui c'è <strong>${data[zone.dataset.id].nome}</strong>.`);
                    returnToStart(draggingElement);
                }
            } else {
                // RILASCIO NEL VUOTO
                returnToStart(draggingElement);
            }

            window.removeEventListener('mousemove', handleDragging);
            window.removeEventListener('mouseup', stopDragging);
            window.removeEventListener('touchmove', handleTouchDragging);
            window.removeEventListener('touchend', stopDragging);
            draggingElement = null;
        }

        function returnToStart(el) {
            el.classList.add('returning');
            el.style.left = originalPos.x + 'px';
            el.style.top = originalPos.y + 'px';
            
            setTimeout(() => {
                el.classList.remove('is-dragging', 'returning');
                el.style.position = '';
                el.style.left = '';
                el.style.top = '';
                el.style.width = '';
                document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('target-correct', 'target-wrong'));
            }, 300);
        }

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-message').innerHTML = msg;
            toast.style.display = 'block';
            if (toastTimeout) clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.style.display = 'none', 2500);
        }

        function checkWin() {
            const filled = document.querySelectorAll(`#layer-${currentView} .drop-zone.filled`).length;
            if (filled === 16) {
                document.getElementById('final-score-display').innerText = `Punteggio Finale: ${totalScore.toLocaleString('it-IT')} / 16`;
                document.getElementById('win-overlay').style.display = 'flex';
            }
        }

        window.onload = () => switchView('explore');
    </script>
</body>
</html>
