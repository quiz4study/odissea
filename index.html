<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Viaggio di Ulisse - Multi-Attività</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap');

        body {
            font-family: 'Fauna+One', serif;
            background-color: #f4ece1;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            user-select: none;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .nav-btn {
            font-family: 'Cinzel', serif;
        }

        .map-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 10px solid #3d2b1f;
            border-radius: 4px;
            background-color: #e5d3b3;
            line-height: 0;
            margin-bottom: 2rem;
        }

        .map-image {
            display: block;
            width: 1000px;
            max-width: 100vw;
            height: auto;
        }

        .marker {
            position: absolute;
            width: 32px;
            height: 32px;
            background-color: rgba(153, 27, 27, 0.9);
            border: 2px solid #fcd34d;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .marker.active-marker {
            background-color: #16a34a;
            transform: translate(-50%, -50%) scale(1.4);
            box-shadow: 0 0 20px #16a34a;
            z-index: 50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(22, 163, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        .info-panel {
            width: 1000px;
            max-width: 95vw;
            background-color: #fdf6e3;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border: 4px solid #854d0e;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 100;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .info-panel.active {
            display: block;
        }

        .drop-zone {
            position: absolute;
            width: 48px;
            height: 48px;
            border: 3px dashed #854d0e;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.1);
            z-index: 5;
            transition: all 0.3s;
        }

        .drop-zone.filled {
            border: 3px solid #16a34a;
            background: rgba(22, 163, 74, 0.7);
            border-style: solid;
            z-index: 20;
        }

        .drop-zone.error {
            animation: shake-hard 0.5s ease-in-out;
            border-color: #dc2626;
            background: rgba(220, 38, 38, 0.3);
            z-index: 1000; 
        }

        .feedback-pop {
            position: absolute;
            bottom: 120%;
            left: 50%;
            transform: translateX(-50%);
            background: #dc2626;
            color: white;
            padding: 18px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            white-space: normal;
            min-width: 280px;
            max-width: 350px;
            text-align: center;
            line-height: 1.5;
            z-index: 1100;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            pointer-events: auto;
            border: 2px solid #fff;
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-in {
            from { opacity: 0; transform: translateX(-50%) scale(0.5); }
            to { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        .feedback-pop::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: #dc2626 transparent transparent transparent;
        }

        .ok-btn {
            margin-top: 12px;
            background: white;
            color: #dc2626;
            padding: 6px 20px;
            border-radius: 20px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-block;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        .draggable-item {
            padding: 14px 20px;
            background: #fdf6e3;
            border: 3px solid #854d0e;
            cursor: grab;
            margin: 8px;
            font-weight: bold;
            font-size: 1rem;
            box-shadow: 5px 5px 0px #854d0e;
            display: inline-block;
            max-width: 450px;
            text-align: center;
            border-radius: 6px;
            transition: all 0.2s;
            line-height: 1.2;
        }

        .draggable-item:hover {
            transform: translate(-3px, -3px);
            box-shadow: 8px 8px 0px #854d0e;
            background-color: #fff;
        }

        .nav-btn {
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            color: #78350f;
        }

        .nav-btn.active {
            color: #92400e;
            border-bottom: 3px solid #92400e;
            background: white;
        }

        @keyframes shake-hard {
            0%, 100% { transform: translate(-50%, -50%); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-58%, -50%); }
            20%, 40%, 60%, 80% { transform: translate(-42%, -50%); }
        }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <nav class="flex gap-2 md:gap-4 mb-8 bg-amber-100 p-2 rounded-lg shadow-inner z-50">
        <button onclick="switchView('explore')" id="btn-explore" class="nav-btn px-4 py-2 font-bold active text-sm md:text-base">Esplorazione</button>
        <button onclick="switchView('match-map')" id="btn-match-map" class="nav-btn px-4 py-2 font-bold text-sm md:text-base">Trova il Luogo</button>
        <button onclick="switchView('match-event')" id="btn-match-event" class="nav-btn px-4 py-2 font-bold text-sm md:text-base">Associa Eventi</button>
    </nav>

    <header class="text-center mb-6">
        <h1 class="text-3xl md:text-5xl font-bold text-amber-900 mb-2 uppercase tracking-tight">Odissea: Il Viaggio di Ulisse</h1>
        <p id="sub-title" class="text-amber-800 italic text-xl">Esplora la mappa interattiva</p>
    </header>

    <!-- VISTA ESPLORAZIONE -->
    <section id="view-explore" class="w-full flex flex-col items-center">
        <div class="map-container">
            <img src="https://i.postimg.cc/fTq64FXP/cartina-del-viaggio-di-ulisse.jpg" class="map-image" alt="Mappa del viaggio di Ulisse">
            <div id="explore-markers"></div>
        </div>

        <button id="startJourney" onclick="showInfoTappa(1)" class="bg-amber-800 text-white px-10 py-4 rounded-full font-bold shadow-xl hover:bg-amber-900 hover:scale-105 transition-all flex items-center gap-3 mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
            Inizia il Viaggio
        </button>

        <div id="infoPanel" class="info-panel">
            <div class="p-6 md:p-10">
                <div class="flex justify-between items-start mb-4 border-b-2 border-amber-200/50 pb-3">
                    <div class="w-full flex items-center justify-between">
                        <div>
                            <h2 id="pTNum" class="text-xs md:text-sm font-bold text-amber-700 uppercase tracking-widest mb-1">Tappa 1</h2>
                            <h3 id="pTNome" class="text-2xl md:text-3xl font-bold text-amber-900">Troia</h3>
                        </div>
                    </div>
                    <button onclick="hideInfoPanel()" class="ml-6 text-3xl text-amber-900/40 hover:text-red-700 transition-colors">&times;</button>
                </div>
                
                <div class="bg-white/40 p-4 md:p-8 rounded-xl border border-amber-100 mb-6 shadow-inner">
                    <p id="pTTesto" class="text-gray-900 italic leading-relaxed text-xl md:text-2xl text-center font-serif"></p>
                </div>
                
                <div class="flex justify-between items-center bg-amber-900/5 p-4 rounded-lg border border-amber-200/50">
                    <button id="pBtnPrev" class="text-amber-900 font-bold flex items-center gap-2 hover:translate-x-[-5px] transition-all text-base md:text-lg px-2">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                        Indietro
                    </button>
                    
                    <button id="pBtnNext" class="bg-amber-800 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 hover:bg-amber-900 hover:translate-x-[5px] transition-all shadow-lg text-base md:text-lg">
                        Avanti
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- VISTA TROVA IL LUOGO -->
    <section id="view-match-map" class="hidden w-full flex flex-col items-center">
        <div class="mb-6 text-center max-w-2xl px-4">
            <p class="text-amber-900 font-bold text-lg md:text-xl bg-white/60 p-4 rounded-lg border-2 border-amber-200">
                Trascina il nome del luogo nella sua posizione corretta sulla mappa.
            </p>
        </div>
        <div class="flex flex-wrap justify-center max-w-5xl gap-2 mb-8 p-6 bg-white/40 rounded-xl border-2 border-amber-200/50" id="map-draggables"></div>
        <div class="map-container">
            <img src="https://i.postimg.cc/fTq64FXP/cartina-del-viaggio-di-ulisse.jpg" class="map-image" alt="Mappa del viaggio di Ulisse">
            <div id="map-dropzones"></div>
        </div>
    </section>

    <!-- VISTA ASSOCIA EVENTI -->
    <section id="view-match-event" class="hidden w-full flex flex-col items-center">
        <div class="mb-6 text-center max-w-2xl px-4">
            <p class="text-amber-900 font-bold text-lg md:text-xl bg-white/60 p-4 rounded-lg border-2 border-amber-200">
                Trascina la descrizione dell'evento nella posizione corretta sulla mappa dove è avvenuto.
            </p>
        </div>
        <div class="flex flex-wrap justify-center max-w-6xl gap-2 mb-8 p-6 bg-white/40 rounded-xl border-2 border-amber-200/50" id="event-draggables"></div>
        <div class="map-container">
            <img src="https://i.postimg.cc/fTq64FXP/cartina-del-viaggio-di-ulisse.jpg" class="map-image" alt="Mappa del viaggio di Ulisse">
            <div id="event-dropzones"></div>
        </div>
    </section>

    <script>
        const data = {
            1: { nome: "Troia", desc: "La partenza: dopo dieci anni di guerra e l'inganno del cavallo, Ulisse inizia il ritorno.", pos: { top: 45.8, left: 92.3 } },
            2: { nome: "Ismaro", desc: "Terra dei Ciconi: Ulisse saccheggia la città ma perde diversi uomini nella battaglia.", pos: { top: 33.9, left: 93.4 } },
            3: { nome: "Lotofagi", desc: "Chi mangia il loto dimentica la patria. Ulisse trascina via i compagni a forza.", pos: { top: 91.6, left: 18.6 } },
            4: { nome: "Ciclopi", desc: "Polifemo cattura Ulisse. L'eroe lo acceca e fugge con l'astuzia di 'Nessuno'.", pos: { top: 64.6, left: 31.5 } },
            5: { nome: "Eolo", desc: "Il dio dona l'otre con i venti. I compagni lo aprono scatenando una tempesta.", pos: { top: 50.4, left: 31.3 } },
            6: { nome: "Lestrigoni", desc: "Giganti cannibali distruggono 11 navi. Ulisse fugge con l'unica nave superstite.", pos: { top: 19.7, left: 26.7 } },
            7: { nome: "Circe", desc: "La maga trasforma gli uomini in porci. Ulisse la sconfigge e resta lì un anno.", pos: { top: 16.8, left: 15.4 } },
            8: { nome: "Ade", desc: "Ulisse scende nel regno dei morti per consultare l'indovino Tiresia sul suo destino.", pos: { top: 7.1, left: 10.7 } },
            9: { nome: "Sirene", desc: "Ulisse ascolta il loro canto legato all'albero, mentre i compagni hanno le orecchie tappate.", pos: { top: 27.4, left: 13.7 } },
            10: { nome: "Scilla e Cariddi", desc: "Tra il mostro e il gorgo marino, Ulisse perde sei compagni ma supera lo stretto.", pos: { top: 47.5, left: 40.9 } },
            11: { nome: "Isola del Sole", desc: "I compagni mangiano le vacche sacre del Sole, attirando su di loro una maledizione.", pos: { top: 57.5, left: 38.5 } },
            12: { nome: "Tempesta", desc: "Zeus fulmina la nave. Tutti annegano tranne Ulisse, che resta solo in mare.", pos: { top: 63.9, left: 45.6 } },
            13: { nome: "Calipso", desc: "La ninfa trattiene Ulisse sull'isola di Ogigia per sette anni offrendogli l'immortalità.", pos: { top: 75.7, left: 44.7 } },
            14: { nome: "Naufragio", desc: "Lasciata Ogigia, Poseidone scatena una tempesta. Ulisse approda nudo dai Feaci.", pos: { top: 77.0, left: 23.9 } },
            15: { nome: "Scheria (Feaci)", desc: "Ulisse racconta il suo viaggio al re Alcinoo, che gli dona una nave per tornare.", pos: { top: 48.0, left: 59.7 } },
            16: { nome: "Itaca", desc: "Ulisse torna a casa. Travestito da mendicante, prepara la vendetta contro i Proci.", pos: { top: 58.8, left: 66.9 } }
        };

        let currentTappaId = null;

        function showInfoTappa(id) {
            id = parseInt(id); 
            currentTappaId = id;
            const info = data[id];
            
            document.getElementById('pTNum').innerText = `Tappa ${id}`;
            document.getElementById('pTNome').innerText = info.nome;
            document.getElementById('pTTesto').innerText = `"${info.desc}"`;
            
            const btnNext = document.getElementById('pBtnNext');
            const btnPrev = document.getElementById('pBtnPrev');
            btnPrev.style.visibility = id > 1 ? 'visible' : 'hidden';
            btnNext.style.visibility = id < 16 ? 'visible' : 'hidden';
            
            btnNext.onclick = () => showInfoTappa(id + 1);
            btnPrev.onclick = () => showInfoTappa(id - 1);
            
            document.querySelectorAll('.marker').forEach(m => {
                m.classList.remove('active-marker');
                if (parseInt(m.innerText) === id) m.classList.add('active-marker');
            });
            
            document.getElementById('infoPanel').classList.add('active');
            document.getElementById('startJourney').classList.add('hidden');
            
            if(window.innerWidth < 1000) document.getElementById('infoPanel').scrollIntoView({ behavior: 'smooth' });
        }

        function hideInfoPanel() {
            document.getElementById('infoPanel').classList.remove('active');
            document.getElementById('startJourney').classList.remove('hidden');
            document.querySelectorAll('.marker').forEach(m => m.classList.remove('active-marker'));
        }

        function switchView(view) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.add('active');
            
            const subTitle = document.getElementById('sub-title');
            if(view === 'explore') subTitle.innerText = "Esplora la mappa interattiva";
            else if(view === 'match-map') subTitle.innerText = "Attività: Trova il Luogo";
            else if(view === 'match-event') subTitle.innerText = "Attività: Associa Eventi";

            if (view !== 'explore') hideInfoPanel();
            if (view === 'match-map') initMatching('map');
            if (view === 'match-event') initMatching('event');
        }

        const exploreContainer = document.getElementById('explore-markers');
        Object.entries(data).forEach(([id, info]) => {
            const m = document.createElement('div');
            m.className = 'marker';
            m.style.top = info.pos.top + '%';
            m.style.left = info.pos.left + '%';
            m.innerText = id;
            m.onclick = () => showInfoTappa(id);
            exploreContainer.appendChild(m);
        });

        function initMatching(type) {
            const dragContainer = document.getElementById(`${type}-draggables`);
            const dropContainer = document.getElementById(`${type}-dropzones`);
            dragContainer.innerHTML = ''; dropContainer.innerHTML = '';
            const items = Object.entries(data).sort(() => Math.random() - 0.5);
            
            items.forEach(([id, info]) => {
                const item = document.createElement('div');
                item.className = 'draggable-item';
                item.innerText = (type === 'map') ? info.nome : info.desc;
                item.draggable = true;
                item.dataset.id = id;
                item.ondragstart = (e) => {
                    e.dataTransfer.setData('text', id);
                    item.style.opacity = "0.5";
                };
                item.ondragend = () => item.style.opacity = "1";
                dragContainer.appendChild(item);

                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.style.top = info.pos.top + '%';
                zone.style.left = info.pos.left + '%';
                zone.ondragover = (e) => e.preventDefault();
                zone.ondrop = (e) => {
                    e.preventDefault();
                    const draggedId = e.dataTransfer.getData('text');
                    
                    const oldPop = zone.querySelector('.feedback-pop');
                    if(oldPop) oldPop.remove();
                    zone.classList.remove('error');

                    if (draggedId === id) {
                        zone.classList.add('filled');
                        zone.innerHTML = `<span class="text-sm text-white font-bold">${id}</span>`;
                        const dragEl = Array.from(dragContainer.children).find(c => c.dataset.id === id);
                        if(dragEl) dragEl.remove();
                    } else {
                        zone.classList.add('error');
                        const pop = document.createElement('div');
                        pop.className = 'feedback-pop';
                        
                        let message = (type === 'event') 
                            ? `In questa posizione sulla mappa avvenne:<br><span class="block mt-2 font-normal italic">"${info.desc}"</span>`
                            : `⚠️ Attenzione! In questa posizione sulla mappa si trova:<br><strong>${info.nome}</strong>`;
                        
                        pop.innerHTML = `
                            <div>${message}</div>
                            <button class="ok-btn" onclick="this.parentElement.parentElement.classList.remove('error'); this.parentElement.remove();">Ho capito</button>
                        `;
                        
                        zone.appendChild(pop);
                    }
                };
                dropContainer.appendChild(zone);
            });
        }
    </script>
</body>
</html>
