<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Viaggio di Ulisse - Multi-Attività</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Fauna+One&display=swap');

        body {
            font-family: 'Fauna+One', serif;
            background-color: #f4ece1;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            user-select: none;
            overflow-x: hidden;
            min-height: 100vh;
        }

        h1, h2, h3, .nav-btn {
            font-family: 'Cinzel', serif;
        }

        .map-container {
            position: relative;
            display: inline-block;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            border: 8px solid #3d2b1f;
            border-radius: 4px;
            background-color: #e5d3b3;
            line-height: 0;
            margin-bottom: 1.5rem;
            max-width: 100%;
        }

        .map-image {
            display: block;
            width: 1000px;
            max-width: 100vw;
            height: auto;
        }

        .marker {
            position: absolute;
            width: 28px;
            height: 28px;
            background-color: rgba(153, 27, 27, 0.9);
            border: 2px solid #fcd34d;
            border-radius: 50%;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        @media (max-width: 640px) {
            .marker { width: 20px; height: 20px; font-size: 10px; }
        }

        .marker.active-marker {
            background-color: #16a34a;
            transform: translate(-50%, -50%) scale(1.3);
            box-shadow: 0 0 15px #16a34a;
            z-index: 50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(22, 163, 74, 0); }
            100% { box-shadow: 0 0 0 0 rgba(22, 163, 74, 0); }
        }

        .info-panel {
            width: 800px; 
            max-width: 92vw;
            background-color: #fdf6e3;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            border: 3px solid #854d0e;
            border-radius: 12px;
            margin-top: 1rem;
            display: none;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.4s ease-out;
            position: relative;
            z-index: 100;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info-panel.active {
            display: block;
        }

        .drop-zone {
            position: absolute;
            width: 4.5%;
            aspect-ratio: 1/1;
            border: 2px dashed #854d0e;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.1);
            z-index: 5;
            transition: all 0.3s;
        }

        .drop-zone.filled {
            border: 2px solid #16a34a;
            background: rgba(22, 163, 74, 0.9);
            border-style: solid;
            animation: success-bounce 0.5s ease;
        }

        @keyframes success-bounce {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.4); }
        }

        .drop-zone.error {
            animation: shake-hard 0.4s ease-in-out, pulse-red 1.5s infinite;
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.4);
            z-index: 200; 
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* Feedback Pop-up Bianco */
        .feedback-pop {
            position: absolute;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            color: #451a03;
            padding: 15px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            min-width: 280px;
            text-align: center;
            z-index: 500;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 3px solid #f59e0b;
            pointer-events: auto;
            animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes pop-in {
            from { opacity: 0; transform: translateX(-50%) scale(0.5); }
            to { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        .feedback-pop::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -10px;
            border-width: 10px;
            border-style: solid;
            border-color: #f59e0b transparent transparent transparent;
        }

        .close-feedback {
            display: block;
            margin: 10px auto 0;
            background: #f59e0b;
            color: #ffffff;
            padding: 6px 20px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .close-feedback:hover {
            background: #d97706;
            transform: scale(1.05);
        }

        .draggable-item {
            padding: 12px 18px;
            background: #fdf6e3;
            border: 2px solid #854d0e;
            cursor: grab;
            margin: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 4px 4px 0px #854d0e;
            display: inline-block;
            max-width: 320px;
            text-align: left;
            border-radius: 8px;
            transition: all 0.2s;
            line-height: 1.4;
            color: #451a03;
        }

        .draggable-item:active {
            cursor: grabbing;
        }

        .draggable-item:hover {
            transform: translateY(-2px);
            background-color: #fff;
            box-shadow: 6px 6px 0px #854d0e;
        }

        .nav-btn {
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            color: #78350f;
            white-space: nowrap;
        }

        .nav-btn.active {
            color: #92400e;
            border-bottom: 3px solid #92400e;
            background: white;
        }

        @keyframes shake-hard {
            0%, 100% { transform: translate(-50%, -50%); }
            20%, 60% { transform: translate(-58%, -50%); }
            40%, 80% { transform: translate(-42%, -50%); }
        }
    </style>
</head>
<body class="p-2 md:p-4 flex flex-col items-center">

    <nav class="flex overflow-x-auto max-w-full gap-2 md:gap-4 mb-6 bg-amber-100 p-1 md:p-2 rounded-lg shadow-inner z-50">
        <button onclick="switchView('explore')" id="btn-explore" class="nav-btn px-4 py-2 font-bold active text-xs md:text-sm">Esplorazione</button>
        <button onclick="switchView('match-map')" id="btn-match-map" class="nav-btn px-4 py-2 font-bold text-xs md:text-sm">Trova Luogo</button>
        <button onclick="switchView('match-event')" id="btn-match-event" class="nav-btn px-4 py-2 font-bold text-xs md:text-sm">Associa Eventi</button>
    </nav>

    <header class="text-center mb-4">
        <h1 class="text-2xl md:text-4xl font-bold text-amber-900 mb-1 uppercase tracking-tight">Il Viaggio di Ulisse</h1>
        <p id="sub-title" class="text-amber-800 italic text-base md:text-lg">Esplora la mappa interattiva</p>
    </header>

    <!-- VISTA ESPLORAZIONE -->
    <section id="view-explore" class="w-full flex flex-col items-center">
        <div class="map-container">
            <img src="https://i.postimg.cc/fTq64FXP/cartina-del-viaggio-di-ulisse.jpg" class="map-image" alt="Mappa del viaggio di Ulisse">
            <div id="explore-markers"></div>
        </div>

        <button id="startJourney" onclick="showInfoTappa(1)" class="bg-amber-800 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-amber-900 hover:scale-105 transition-all flex items-center gap-2 mb-4 text-sm md:text-base">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
            Inizia il Viaggio
        </button>

        <div id="infoPanel" class="info-panel">
            <div class="p-4 md:p-6">
                <div class="flex justify-between items-start mb-3 border-b border-amber-200/50 pb-2">
                    <div>
                        <h2 id="pTNum" class="text-[10px] md:text-xs font-bold text-amber-700 uppercase tracking-widest">Tappa 1</h2>
                        <h3 id="pTNome" class="text-xl md:text-2xl font-bold text-amber-900">Troia</h3>
                    </div>
                    <button onclick="hideInfoPanel()" class="text-2xl text-amber-900/40 hover:text-red-700">&times;</button>
                </div>
                
                <div class="bg-white/50 p-3 md:p-5 rounded-lg border border-amber-100 mb-4 shadow-sm">
                    <p id="pTTesto" class="text-gray-900 italic leading-snug text-base md:text-xl text-center font-serif"></p>
                </div>
                
                <div class="flex justify-between items-center bg-amber-900/5 p-2 md:p-3 rounded-lg border border-amber-200/50">
                    <button id="pBtnPrev" class="text-amber-900 font-bold flex items-center gap-1 hover:translate-x-[-3px] transition-all text-sm md:text-base">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                        Indietro
                    </button>
                    
                    <button id="pBtnNext" class="bg-amber-800 text-white px-5 py-2 rounded-md font-bold flex items-center gap-1 hover:bg-amber-900 hover:translate-x-[3px] transition-all shadow-md text-sm md:text-base">
                        Avanti
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- VISTA TROVA IL LUOGO -->
    <section id="view-match-map" class="hidden w-full flex flex-col items-center">
        <div class="mb-4 text-center max-w-2xl px-2">
            <p class="text-amber-900 font-bold text-sm md:text-base bg-white/60 p-3 rounded-lg border border-amber-200">
                Trascina il nome del luogo nella sua posizione corretta sulla mappa.
            </p>
        </div>
        <div class="flex flex-wrap justify-center max-w-4xl gap-1 mb-4 p-3 bg-white/40 rounded-xl border border-amber-200/50" id="map-draggables"></div>
        <div class="map-container">
            <img src="https://i.postimg.cc/fTq64FXP/cartina-del-viaggio-di-ulisse.jpg" class="map-image" alt="Mappa del viaggio di Ulisse">
            <div id="map-dropzones"></div>
        </div>
    </section>

    <!-- VISTA ASSOCIA EVENTI -->
    <section id="view-match-event" class="hidden w-full flex flex-col items-center">
        <div class="mb-4 text-center max-w-2xl px-2">
            <p class="text-amber-900 font-bold text-sm md:text-base bg-white/60 p-3 rounded-lg border border-amber-200">
                Trascina la descrizione dell'evento nel luogo corretto sulla mappa.
            </p>
        </div>
        <div class="flex flex-wrap justify-center max-w-6xl gap-2 mb-4 p-3 bg-white/40 rounded-xl border border-amber-200/50" id="event-draggables"></div>
        <div class="map-container">
            <img src="https://i.postimg.cc/fTq64FXP/cartina-del-viaggio-di-ulisse.jpg" class="map-image" alt="Mappa del viaggio di Ulisse">
            <div id="event-dropzones"></div>
        </div>
    </section>

    <script>
        const data = {
            1: { nome: "Troia", desc: "La partenza: dopo dieci anni di guerra e l'inganno del cavallo, Ulisse inizia il ritorno.", pos: { top: 45.8, left: 92.3 } },
            2: { nome: "Ismaro", desc: "Terra dei Ciconi: Ulisse saccheggia la città ma perde diversi uomini nella battaglia.", pos: { top: 33.9, left: 93.4 } },
            3: { nome: "Lotofagi", desc: "Chi mangia il loto dimentica la patria. Ulisse trascina via i compagni a forza.", pos: { top: 91.6, left: 18.6 } },
            4: { nome: "Ciclopi", desc: "Polifemo cattura Ulisse. L'eroe lo acceca e fugge con l'astuzia di 'Nessuno'.", pos: { top: 64.6, left: 31.5 } },
            5: { nome: "Eolo", desc: "Il dio dona l'otre con i venti. I compagni lo aprono scatenando una tempesta.", pos: { top: 50.4, left: 31.3 } },
            6: { nome: "Lestrigoni", desc: "Giganti cannibali distruggono 11 navi. Ulisse fugge con l'unica nave superstite.", pos: { top: 19.7, left: 26.7 } },
            7: { nome: "Circe", desc: "La maga trasforma gli uomini in porci. Ulisse la sconfigge e resta lì un anno.", pos: { top: 16.8, left: 15.4 } },
            8: { nome: "Ade", desc: "Ulisse scende nel regno dei morti per consultare l'indovino Tiresia sul suo destino.", pos: { top: 7.1, left: 10.7 } },
            9: { nome: "Sirene", desc: "Ulisse ascolta il loro canto legato all'albero, mentre i compagni hanno le orecchie tappate.", pos: { top: 27.4, left: 13.7 } },
            10: { nome: "Scilla e Cariddi", desc: "Tra il mostro e il gorgo marino, Ulisse perde sei compagni ma supera lo stretto.", pos: { top: 47.5, left: 40.9 } },
            11: { nome: "Isola del Sole", desc: "I compagni mangiano le vacche sacre del Sole, attirando su di loro una maledizione.", pos: { top: 57.5, left: 38.5 } },
            12: { nome: "Tempesta", desc: "Zeus fulmina la nave. Tutti annegano tranne Ulisse, che resta solo in mare.", pos: { top: 63.9, left: 45.6 } },
            13: { nome: "Calipso", desc: "La ninfa trattiene Ulisse sull'isola di Ogigia per sette anni offrendogli l'immortalità.", pos: { top: 75.7, left: 44.7 } },
            14: { nome: "Naufragio", desc: "Lasciata Ogigia, Poseidone scatena una tempesta. Ulisse approda nudo dai Feaci.", pos: { top: 77.0, left: 23.9 } },
            15: { nome: "Scheria (Feaci)", desc: "Ulisse racconta il suo viaggio al re Alcinoo, che gli dona una nave per tornare.", pos: { top: 48.0, left: 59.7 } },
            16: { nome: "Itaca", desc: "Ulisse torna a casa. Travestito da mendicante, prepara la vendetta contro i Proci.", pos: { top: 58.8, left: 66.9 } }
        };

        function showInfoTappa(id) {
            id = parseInt(id); 
            const info = data[id];
            
            document.getElementById('pTNome').innerText = info.nome;
            document.getElementById('pTTesto').innerText = `"${info.desc}"`;
            
            const btnNext = document.getElementById('pBtnNext');
            const btnPrev = document.getElementById('pBtnPrev');
            btnPrev.style.visibility = id > 1 ? 'visible' : 'hidden';
            btnNext.style.visibility = id < 16 ? 'visible' : 'hidden';
            
            btnNext.onclick = () => showInfoTappa(id + 1);
            btnPrev.onclick = () => showInfoTappa(id - 1);
            
            document.querySelectorAll('.marker').forEach(m => {
                m.classList.remove('active-marker');
                if (parseInt(m.innerText) === id) m.classList.add('active-marker');
            });
            
            document.getElementById('infoPanel').classList.add('active');
            document.getElementById('startJourney').classList.add('hidden');
            
            const elementPosition = document.getElementById('infoPanel').getBoundingClientRect().top;
            const offsetPosition = elementPosition + window.pageYOffset - 50;
            window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
        }

        function hideInfoPanel() {
            document.getElementById('infoPanel').classList.remove('active');
            document.getElementById('startJourney').classList.remove('hidden');
            document.querySelectorAll('.marker').forEach(m => m.classList.remove('active-marker'));
        }

        function switchView(view) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            document.getElementById(`btn-${view}`).classList.add('active');
            
            const subTitle = document.getElementById('sub-title');
            if(view === 'explore') subTitle.innerText = "Esplora la mappa interattiva";
            else if(view === 'match-map') subTitle.innerText = "Attività: Trova il Luogo";
            else if(view === 'match-event') subTitle.innerText = "Attività: Associa Eventi";

            if (view !== 'explore') hideInfoPanel();
            if (view === 'match-map') initMatching('map');
            if (view === 'match-event') initMatching('event');
        }

        const exploreContainer = document.getElementById('explore-markers');
        Object.entries(data).forEach(([id, info]) => {
            const m = document.createElement('div');
            m.className = 'marker';
            m.style.top = info.pos.top + '%';
            m.style.left = info.pos.left + '%';
            m.innerText = id;
            m.onclick = () => showInfoTappa(id);
            exploreContainer.appendChild(m);
        });

        function initMatching(type) {
            const dragContainer = document.getElementById(`${type}-draggables`);
            const dropContainer = document.getElementById(`${type}-dropzones`);
            dragContainer.innerHTML = ''; dropContainer.innerHTML = '';
            
            const items = Object.entries(data).sort(() => Math.random() - 0.5);
            
            items.forEach(([id, info]) => {
                const item = document.createElement('div');
                item.className = 'draggable-item';
                item.innerText = (type === 'map') ? info.nome : info.desc;
                item.draggable = true;
                item.dataset.id = id;
                item.ondragstart = (e) => {
                    e.dataTransfer.setData('text', id);
                    item.style.opacity = "0.4";
                };
                item.ondragend = () => item.style.opacity = "1";
                dragContainer.appendChild(item);

                const zone = document.createElement('div');
                zone.className = 'drop-zone';
                zone.style.top = info.pos.top + '%';
                zone.style.left = info.pos.left + '%';
                zone.ondragover = (e) => e.preventDefault();
                zone.ondrop = (e) => {
                    e.preventDefault();
                    const draggedId = e.dataTransfer.getData('text');
                    
                    const oldPop = zone.querySelector('.feedback-pop');
                    if(oldPop) oldPop.remove();

                    if (draggedId === id) {
                        zone.classList.remove('error');
                        zone.classList.add('filled');
                        zone.innerHTML = `<span class="text-[10px] md:text-xs text-white font-bold">${id}</span>`;
                        const dragEl = Array.from(dragContainer.children).find(c => c.dataset.id === id);
                        if(dragEl) dragEl.remove();
                    } else {
                        zone.classList.add('error');
                        const pop = document.createElement('div');
                        pop.className = 'feedback-pop';
                        
                        let feedbackContent = '';
                        if(type === 'map') {
                            feedbackContent = `In questa posizione c'è: <br><span class="text-amber-800 uppercase font-bold">${info.nome}</span>`;
                        } else {
                            feedbackContent = `In questa posizione è avvenuto: <br><span class="text-amber-800 italic font-serif">"${info.desc}"</span>`;
                        }

                        pop.innerHTML = `
                            <div class="text-amber-600 font-black mb-1 tracking-wider">ATTENZIONE!</div>
                            <div class="text-xs font-normal text-gray-800 mb-2 leading-tight px-2">
                                ${feedbackContent}
                            </div>
                            <button class="close-feedback" onclick="this.parentElement.parentElement.classList.remove('error'); this.parentElement.remove(); event.stopPropagation();">OK</button>
                        `;
                        zone.appendChild(pop);
                    }
                };
                dropContainer.appendChild(zone);
            });
        }
    </script>
</body>
</html>
